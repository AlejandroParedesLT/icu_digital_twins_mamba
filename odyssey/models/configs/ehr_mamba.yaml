model:
  embedding_size: 256
  time_embeddings_size: 32
  visit_order_size: 3
  type_vocab_size: 9
  max_seq_length: 1024
  max_num_visits: 124
  state_size: 16
  num_hidden_layers: 32
  expand: 2
  conv_kernel: 4
  dropout_prob: 0.1
  learning_rate: 5.e-5
  use_mambapy: False

model_finetune:
  learning_rate: 5.e-5
  classifier_dropout: 0.1
  multi_head: False

train:
  batch_size: 3 
  num_workers: 5 #5
  gpus: 1
  nodes: 1
  max_epochs: 3
  acc: 1
  persistent_workers: True
  pin_memory: False

finetune:
  batch_size: 4 #26
  num_workers: 3 #5
  gpus: 1 #4
  nodes: 1
  max_epochs: 3 #6
  acc: 1
  patience: 10
  persistent_workers: True
  pin_memory: False
